name: Android Build

on:
  workflow_dispatch:
    inputs:
      gradle_task:
        description: Gradle task to run
        required: true
        default: assembleDebug
        type: choice
        options:
          - assembleDebug
          - ':app:assembleNightly'
          - ':app:assembleClone'
          - ':app:bundleRelease'
      run_unit_tests:
        description: Run JVM unit tests after the build
        required: false
        default: false
        type: boolean
      run_android_lint:
        description: Run Android lint after the build
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - .github/workflows/android-build.yml
      - .gitmodules
      - .npmrc
      - app/**
      - build.gradle.kts
      - ci/script/download_android_dependencies.sh
      - ci/script/prepare_android_dependencies.py
      - cmake/**
      - dragonbones/**
      - examples/**
      - fbx/**
      - gradle/**
      - gradle.properties
      - gradlew
      - gradlew.bat
      - llama/**
      - mmd/**
      - mnn/**
      - package.json
      - package-lock.json
      - npm-shrinkwrap.json
      - pnpm-workspace.yaml
      - quickjs/**
      - settings.gradle.kts
      - showerclient/**
      - terminal/**
      - terminal
      - tools/native_ripgrep/**
      - tools/packages_whitelist.txt
      - tools/example_packages/sync_example_packages.py
      - web-chat/**

concurrency:
  group: android-build-${{ github.event_name }}-${{ github.ref }}-${{ github.event.inputs.gradle_task }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  ANDROID_NDK_VERSION: '25.1.8937393'
  ANDROID_CMAKE_VERSION: '3.22.1'
  MANUAL_DEPS_DIR: manual-deps

jobs:
  build:
    name: Build Android artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Checkout source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Initialize terminal submodule
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync -- terminal
          git submodule update --init --recursive --depth 1 terminal
          git submodule status -- terminal

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android SDK, NDK and CMake
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "platforms;android-36" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" \
            "ndk;$ANDROID_NDK_VERSION" \
            "cmake;$ANDROID_CMAKE_VERSION"

      - name: Restore Android dependency cache
        id: cache-manual-deps
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ env.MANUAL_DEPS_DIR }}
          key: android-full-deps-${{ runner.os }}-${{ hashFiles('ci/script/download_android_dependencies.sh', 'ci/script/prepare_android_dependencies.py') }}

      - name: Download Android dependencies
        if: steps.cache-manual-deps.outputs.cache-hit != 'true'
        run: bash ci/script/download_android_dependencies.sh full "$MANUAL_DEPS_DIR"

      - name: Prepare Android dependencies
        run: |
          python3 ci/script/prepare_android_dependencies.py \
            --profile full \
            --archives "$MANUAL_DEPS_DIR" \
            --repository "$GITHUB_WORKSPACE"

      # MODIFIED: cache key 改为不带架构名，以便复用两种架构的缓存
      - name: Restore native ripgrep cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/native_ripgrep/target
          key: native-ripgrep-${{ runner.os }}-${{ hashFiles('tools/native_ripgrep/Cargo.lock') }}

      # MODIFIED: 改为同时构建 arm64-v8a 和 armeabi-v7a
      - name: Build native ripgrep
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          NDK_LLVM="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

          # 安装 Rust 工具链并添加两个目标平台
          rustup toolchain install 1.88.0 --profile minimal
          rustup target add --toolchain 1.88.0 aarch64-linux-android armv7-linux-androideabi

          # 1. 构建 arm64-v8a (aarch64)
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$NDK_LLVM/aarch64-linux-android26-clang"
          cargo +1.88.0 build \
            --manifest-path tools/native_ripgrep/Cargo.toml \
            --release \
            --target armv7-linux-androideabi \
            --locked
          install -Dm755 \
            tools/native_ripgrep/target/aarch64-linux-android/release/liboperit_ripgrep.so \
            app/src/main/jniLibs/arm64-v8a/liboperit_ripgrep.so

          # 2. 构建 armeabi-v7a (armv7a)
          export CARGO_TARGET_ARMV7A_LINUX_ANDROIDEABI_LINKER="$NDK_LLVM/armv7a-linux-androideabi26-clang"
          cargo +1.88.0 build \
            --manifest-path tools/native_ripgrep/Cargo.toml \
            --release \
            --target armv7a-linux-androideabi \
            --locked
          install -Dm755 \
            tools/native_ripgrep/target/armv7a-linux-androideabi/release/liboperit_ripgrep.so \
            app/src/main/jniLibs/armeabi-v7a/liboperit_ripgrep.so

          # 校验两个文件都存在
          test -s app/src/main/jniLibs/arm64-v8a/liboperit_ripgrep.so
          test -s app/src/main/jniLibs/armeabi-v7a/liboperit_ripgrep.so

      - name: Install JavaScript dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install -g pnpm@10.34.5
          npm ci --no-audit --no-fund
          npm --prefix web-chat ci --no-audit --no-fund

      - name: Build WebChat assets
        run: |
          npm --prefix web-chat run typecheck
          npm run build:webchat

      - name: Build bundled ToolPkg packages
        run: |
          npm run build:examples:github
          git diff --exit-code -- examples/github.js
          python3 tools/example_packages/sync_example_packages.py --no-hot-reload

      - name: Configure Android build
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OPERIT_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OPERIT_GITHUB_CLIENT_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          : "${GITHUB_CLIENT_ID:?OPERIT_GITHUB_CLIENT_ID is required}"
          : "${GITHUB_CLIENT_SECRET:?OPERIT_GITHUB_CLIENT_SECRET is required}"
          umask 077
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID"
            echo "GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET"
          } > local.properties

      - name: Run Gradle build
        id: gradle-build
        env:
          DISPATCH_GRADLE_TASK: ${{ inputs.gradle_task }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            push) gradle_task=assembleDebug ;;
            workflow_dispatch) gradle_task="$DISPATCH_GRADLE_TASK" ;;
            *) echo "Unsupported workflow event: $EVENT_NAME" >&2; exit 2 ;;
          esac
          chmod +x ./gradlew
          ./gradlew "$gradle_task" --stacktrace --no-build-cache --no-daemon

      - name: Run JVM unit tests
        if: >-
          !cancelled() &&
          steps.gradle-build.outcome == 'success' &&
          (github.event_name == 'push' || inputs.run_unit_tests)
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-build-cache --no-daemon

      - name: Run Android lint
        if: >-
          !cancelled() &&
          steps.gradle-build.outcome == 'success' &&
          (github.event_name == 'push' || inputs.run_android_lint)
        run: ./gradlew :app:lintDebug --stacktrace --no-build-cache --no-daemon

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: operit-android-reports-${{ github.run_number }}
          path: |
            app/build/reports/**
            build/reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload successful Android outputs
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: operit-android-${{ github.run_number }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
          retention-days: 14
