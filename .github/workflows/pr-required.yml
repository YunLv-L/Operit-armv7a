name: PR Required

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-required-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      base_sha: ${{ steps.detect.outputs.base_sha }}
      head_sha: ${{ steps.detect.outputs.head_sha }}
      android: ${{ steps.detect.outputs.android }}
      localization: ${{ steps.detect.outputs.localization }}
      web: ${{ steps.detect.outputs.web }}
      docs: ${{ steps.detect.outputs.docs }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            pull_request)
              base_sha="$PR_BASE_SHA"
              head_sha="$PR_HEAD_SHA"
              ;;
            workflow_dispatch)
              base_sha=""
              head_sha="$HEAD_SHA"
              ;;
            *)
              base_sha="$BEFORE_SHA"
              head_sha="$HEAD_SHA"
              ;;
          esac

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
            changed_files="$(git ls-files)"
          else
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          fi

          android=false
          localization=false
          web=false
          docs=false

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              app/*|dragonbones/*|fbx/*|llama/*|mmd/*|mnn/*|quickjs/*|showerclient/*|terminal/*|tools/native_ripgrep/*|gradle/*|build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|package.json|pnpm-workspace.yaml|packages_whitelist.txt|sync_example_packages.py|.github/workflows/android-build.yml)
                android=true
                ;;
            esac
            case "$path" in
              web-chat/*)
                web=true
                android=true
                ;;
            esac
            case "$path" in
              app/src/main/res/values*/strings.xml|tools/string/*)
                localization=true
                ;;
            esac
            case "$path" in
              *.md|*.mdx|docs/*|ci/README.md)
                docs=true
                ;;
            esac
          done <<< "$changed_files"

          {
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
            echo "android=$android"
            echo "localization=$localization"
            echo "web=$web"
            echo "docs=$docs"
          } >> "$GITHUB_OUTPUT"

          printf 'Changed areas: android=%s localization=%s web=%s docs=%s\n' \
            "$android" "$localization" "$web" "$docs"

  repo-hygiene:
    name: Repository hygiene
    needs: changes
    runs-on: ubuntu-24.04
    env:
      BASE_SHA: ${{ needs.changes.outputs.base_sha }}
      HEAD_SHA: ${{ needs.changes.outputs.head_sha }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.head_sha }}
          fetch-depth: 0

      - name: Check whitespace errors
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$BASE_SHA" ]]; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          else
            git diff --check "$HEAD_SHA^" "$HEAD_SHA"
          fi

      - name: Check changed files
        run: python3 ci/script/check_repo_hygiene.py --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA"

      - name: Check local Markdown links
        run: python3 ci/script/check_markdown_links.py --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA"

      - name: Parse changed YAML files
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$BASE_SHA" ]]; then
            mapfile -t yaml_files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" | rg '\.ya?ml$' || true)
          else
            mapfile -t yaml_files < <(git ls-files | rg '\.ya?ml$' || true)
          fi
          if (( ${#yaml_files[@]} > 0 )); then
            ruby -ryaml -e 'ARGV.each { |path| YAML.safe_load_file(path, aliases: true); puts "YAML OK: #{path}" }' -- "${yaml_files[@]}"
          fi

      - name: Check GitHub Actions syntax
        run: docker run --rm -v "$GITHUB_WORKSPACE:/repo" -w /repo rhysd/actionlint:1.7.7

  localization:
    name: Localization
    needs: changes
    if: needs.changes.outputs.localization == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.head_sha }}
          fetch-depth: 0

      - name: Check Android string resources
        run: python3 ci/script/check_localizations.py --base-sha "${{ needs.changes.outputs.base_sha }}" --head-sha "${{ needs.changes.outputs.head_sha }}"

  web-checks:
    name: WebChat checks
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.head_sha }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install WebChat dependencies
        run: npm --prefix web-chat install --no-audit --no-fund

      - name: Typecheck WebChat
        run: npm --prefix web-chat run typecheck

      - name: Build WebChat
        run: npm --prefix web-chat run build

  android-build:
    name: Android Build
    needs: changes
    if: needs.changes.outputs.android == 'true'
    uses: ./.github/workflows/android-build.yml
    with:
      checkout_ref: ${{ needs.changes.outputs.head_sha }}
      gradle_task: assembleDebug
      run_unit_tests: true
      run_android_lint: true
    secrets: inherit

  pr-policy:
    name: PR policy
    needs: changes
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Check PR title and body
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          title = os.environ["PR_TITLE"].strip()
          body = os.environ.get("PR_BODY", "")
          errors = []

          title_pattern = re.compile(
              r"^(feat|fix|docs|chore|refactor|test|perf|build|ci)"
              r"(?:\([a-z0-9._/-]+\))?!?:\s+\S+"
          )
          if not title_pattern.match(title):
              errors.append("PR title must use Conventional Commit style, for example `fix(chat): preserve scroll position`.")

          required_sections = (
              "## 变更说明 / Description",
              "## 关联 Issue / Related issue",
              "## 验证方式 / Verification",
              "## 检查清单 / Checklist",
          )
          for section in required_sections:
              if section not in body:
                  errors.append(f"PR body is missing section: {section}")

          checked_items = re.findall(r"(?m)^- \[[xX]\]\s+(.+)$", body)
          required_checklist_items = (
              (
                  "我已记录可复现验证和未运行项原因",
                  "Reproducible verification and reasons for unrun checks are recorded",
              ),
              (
                  "与改动范围匹配的必需 CI 已通过或按路径规则跳过",
                  "Required CI passed or was skipped by path rules",
              ),
              (
                  "最终 diff 无无关、临时、生成、二进制或敏感内容",
                  "Final diff has no unrelated, temporary, generated, binary, or secret content",
              ),
              (
                  "已提供对应的回归、UI、文档/字符串或兼容性证据",
                  "Relevant regression, UI, docs/strings, or compatibility evidence is provided",
              ),
          )
          for chinese_label, english_label in required_checklist_items:
              if not any(item.startswith((chinese_label, english_label)) for item in checked_items):
                  errors.append(f"Required checklist item is unchecked: {chinese_label} / {english_label}.")

          kind = title.split(":", 1)[0].split("(", 1)[0]
          if kind in {"feat", "fix", "perf"} and not re.search(
              r"(?i)(?:closes|fixes|resolves)\s+#\d+|#\d+", body
          ):
              errors.append("Feature, bug-fix and performance PRs must reference an Issue.")

          if errors:
              print("PR policy check failed:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)

          print("PR policy check passed.")
          PY

  documentation-advisory:
    name: Documentation advisory
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    continue-on-error: true
    runs-on: ubuntu-24.04
    env:
      BASE_SHA: ${{ needs.changes.outputs.base_sha }}
      HEAD_SHA: ${{ needs.changes.outputs.head_sha }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect changed documentation files
        id: files
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$BASE_SHA" ]]; then
            source_files="$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA")"
          else
            source_files="$(git ls-files)"
          fi
          : > changed-docs.txt
          while IFS= read -r path; do
            case "$path" in
              *.md|*.mdx)
                case "$path" in
                  llama/third_party/*|mmd/third_party/*|mnn/src/main/cpp/MNN/*)
                    ;;
                  *) printf '%s\n' "$path" >> changed-docs.txt ;;
                esac
                ;;
            esac
          done <<< "$source_files"
          sort -u -o changed-docs.txt changed-docs.txt
          cat changed-docs.txt

      - name: Codespell advisory
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ -s changed-docs.txt ]]; then
            python3 -m pip install --disable-pip-version-check codespell==2.4.1
            xargs -r codespell \
              --ignore-words-list=operit,operitai,quickjs,deepseek,mnn,mcp,skill,webchat \
              < changed-docs.txt
          fi

      - name: Set up Node.js for Markdownlint
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Markdownlint
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ -s changed-docs.txt ]]; then
            mapfile -t files < changed-docs.txt
            npx --yes markdownlint-cli2@0.18.1 "${files[@]}"
          fi

  required:
    name: CI required
    if: always()
    needs:
      - changes
      - repo-hygiene
      - localization
      - web-checks
      - android-build
      - pr-policy
    runs-on: ubuntu-24.04
    steps:
      - name: Require successful checks
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: value["result"]
              for name, value in needs.items()
              if value["result"] not in {"success", "skipped"}
          }
          if failed:
              print("Required CI checks failed:")
              for name, result in failed.items():
                  print(f"- {name}: {result}")
              sys.exit(1)
          print("All required CI checks passed or were intentionally skipped.")
          PY
